<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Миний AI Chatbot</title>
  <style>
    body { font-family: Arial; max-width: 500px; margin: 40px auto; padding: 0 1rem; }
    #messages { height: 400px; overflow-y: auto; border: 1px solid #ccc; border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; }
    .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 14px; line-height: 1.5; }
    .user { background: #378add; color: white; align-self: flex-end; }
    .bot { background: white; border: 1px solid #ddd; align-self: flex-start; }
    .input-row { display: flex; gap: 8px; margin-top: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
    button { padding: 10px 18px; background: #378add; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:disabled { background: #aaa; }
  </style>
</head>
<body>
  <h2>Миний AI Chatbot 🤖</h2>
  <div id="messages">
    <div class="msg bot">Сайн уу! Би AI chatbot. Юу ч асуугаарай 😊</div>
  </div>
  <div class="input-row">
    <input type="text" id="inp" placeholder="Бичнэ үү..." onkeydown="if(event.key==='Enter')send()" />
    <button id="btn" onclick="send()">Илгээх</button>
  </div>
  <script>
    const API_KEY = "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";

    async function send() {
      const inp = document.getElementById('inp');
      const btn = document.getElementById('btn');
      const text = inp.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      inp.value = '';
      btn.disabled = true;
      const typing = addMsg('Бодож байна...', 'bot');
      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + API_KEY
          },
          body: JSON.stringify({
            model: 'llama-3.3-70b-versatile',
            messages: [{ role: 'user', content: text }]
          })
        });
        const data = await res.json();
        typing.remove();
        addMsg(data.choices[0].message.content, 'bot');
      } catch(e) {
        typing.remove();
        addMsg('Алдаа гарлаа 😅', 'bot');
      }
      btn.disabled = false;
    }

    function addMsg(text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      const msgs = document.getElementById('messages');
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
