<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Миний Chatbot</title>
  <style>
    body { font-family: Arial; max-width: 500px; margin: 40px auto; padding: 0 1rem; }
    #messages { height: 320px; overflow-y: auto; border: 1px solid #ccc; border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; }
    .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; }
    .user { background: #378add; color: white; align-self: flex-end; }
    .bot { background: white; border: 1px solid #ddd; align-self: flex-start; }
    .input-row { display: flex; gap: 8px; margin-top: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    button { padding: 10px 18px; background: #378add; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Миний Chatbot 🤖</h2>
  <div id="messages">
    <div class="msg bot">Сайн уу! Би chatbot. Ярилцаарай 😊</div>
  </div>
  <div class="input-row">
    <input type="text" id="inp" placeholder="Бичнэ үү..." onkeydown="if(event.key==='Enter')send()" />
    <button onclick="send()">Илгээх</button>
  </div>
  <script>
    const replies = {
      "сайн уу": "Сайн сайн! 😊",
      "чи хэн бэ": "Би chatbot! Чамайг хийсэн шүү 😄",
      "баяртай": "Баяртай! 👋",
      "баярлалаа": "За за! 😊",
    };
    function send() {
      const inp = document.getElementById('inp');
      const text = inp.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      setTimeout(() => {
        const lower = text.toLowerCase();
        let reply = "Сонирхолтой! Өөр зүйл асуугаарай 🤔";
        for (const key in replies) {
          if (lower.includes(key)) { reply = replies[key]; break; }
        }
        addMsg(reply, 'bot');
      }, 400);
      inp.value = '';
    }
    function addMsg(text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      const msgs = document.getElementById('messages');
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>
